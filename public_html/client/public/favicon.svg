<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Asteroid body -->
  <ellipse cx="32" cy="36" rx="18" ry="14" fill="#4B5563" transform="rotate(-20 32 36)"/>
  <ellipse cx="28" cy="32" rx="14" ry="10" fill="#6B7280" transform="rotate(-20 28 32)"/>
  <!-- Craters -->
  <circle cx="26" cy="38" r="3" fill="#374151"/>
  <circle cx="36" cy="32" r="2" fill="#374151"/>
  <circle cx="30" cy="42" r="1.5" fill="#374151"/>
  <!-- Orbit ring -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.6"/>
  <!-- Small planet/star -->
  <circle cx="60" cy="32" r="3" fill="#60A5FA"/>
  <!-- Stars -->
  <circle cx="8" cy="12" r="1" fill="#F1F5F9" opacity="0.8"/>
  <circle cx="52" cy="8" r="1.2" fill="#F1F5F9" opacity="0.6"/>
  <circle cx="14" cy="50" r="0.8" fill="#F1F5F9" opacity="0.7"/>
  <circle cx="56" cy="54" r="1" fill="#F1F5F9" opacity="0.5"/>
  <circle cx="4" cy="36" r="0.8" fill="#A78BFA" opacity="0.8"/>
</svg>
